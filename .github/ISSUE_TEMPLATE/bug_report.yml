name: Bug report
description: Report a reproducible Cyber AI Team problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include commands, API calls, UI steps, or fixtures.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Owner Console
        - Backend API
        - Agents / Governor / Observer
        - Memory
        - ERPNext integration
        - Workflows / Temporal
        - Deployment / Docker
        - Security / Approvals
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or evidence
      description: Paste non-sensitive logs only. Do not include secrets, tokens, customer data, or private URLs.
      render: text
