services:
  # ─── Core API ──────────────────────────────────────────────────────
  core:
    image: ${CORE_IMAGE:-cyber-team-core:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-core
    ports:
      - "${API_PUBLISHED_PORT:-8000}:8000"
    env_file: ${CYBERTEAM_ENV_FILE:-.env}
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - QDRANT_HOST=qdrant
      - TEMPORAL_HOST=temporal
      - OPA_API_URL=http://opa:8181
      - ERPNEXT_URL=http://erpnext-frontend:8080
      - OPENFGA_API_URL=http://openfga:8080
      - APP_VERSION=${APP_VERSION:-0.1.0}
      - BUILD_SHA=${BUILD_SHA:-local}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      temporal:
        condition: service_started
      opa:
        condition: service_started
    volumes:
      - core-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Temporal Workers ──────────────────────────────────────────────
  worker:
    image: ${CORE_IMAGE:-cyber-team-core:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-worker
    command: ["python", "-m", "cyber_team.worker"]
    env_file: ${CYBERTEAM_ENV_FILE:-.env}
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - QDRANT_HOST=qdrant
      - TEMPORAL_HOST=temporal
      - OPA_API_URL=http://opa:8181
      - ERPNEXT_URL=http://erpnext-frontend:8080
      - APP_VERSION=${APP_VERSION:-0.1.0}
      - BUILD_SHA=${BUILD_SHA:-local}
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    volumes:
      - core-data:/app/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Owner Console UI ─────────────────────────────────────────────
  ui:
    image: ${UI_IMAGE:-cyber-team-ui:latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
        NEXT_PUBLIC_APP_VERSION: ${APP_VERSION:-0.1.0}
        NEXT_PUBLIC_BUILD_SHA: ${BUILD_SHA:-local}
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-ui
    ports:
      - "${UI_PUBLISHED_PORT:-3001}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
      - NEXT_PUBLIC_APP_VERSION=${APP_VERSION:-0.1.0}
      - NEXT_PUBLIC_BUILD_SHA=${BUILD_SHA:-local}
    depends_on:
      core:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ─── PostgreSQL ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cyberteam}
      POSTGRES_USER: ${POSTGRES_USER:-cyberteam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme-postgres-password}
    ports:
      - "${POSTGRES_PUBLISHED_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cyberteam}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── DB Init (creates extra databases) ────────────────────────────
  db-init:
    image: postgres:16-alpine
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-db-init
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER:-cyberteam}
      PGPASSWORD: ${POSTGRES_PASSWORD:-changeme-postgres-password}
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: >
      bash -c "
        for DB in langfuse temporal; do
          psql -d postgres -tc \"SELECT 1 FROM pg_database WHERE datname = '$$DB'\" | grep -q 1 ||
          psql -d postgres -c \"CREATE DATABASE $$DB\";
        done;
        echo 'Databases ready.'
      "
    restart: "no"

  # ─── Redis ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme-redis-password}
    ports:
      - "${REDIS_PUBLISHED_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme-redis-password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Qdrant (Vector DB) ───────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-qdrant
    ports:
      - "${QDRANT_HTTP_PUBLISHED_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PUBLISHED_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  # ─── Temporal ──────────────────────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:latest
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-temporal
    environment:
      - DB=postgres12
      - DB_NAME=temporal
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-cyberteam}
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-changeme-postgres-password}
      - POSTGRES_SEEDS=postgres
    depends_on:
      db-init:
        condition: service_completed_successfully
    ports:
      - "${TEMPORAL_PUBLISHED_PORT:-7233}:7233"
    volumes:
      - temporal-data:/etc/temporal/config
    restart: unless-stopped

  temporal-admin-tools:
    image: temporalio/admin-tools:latest
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-temporal-admin
    profiles: ["admin"]
    environment:
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    depends_on:
      - temporal
    restart: unless-stopped

  # ─── OPA (Policy Engine) ──────────────────────────────────────────
  opa:
    image: openpolicyagent/opa:latest
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-opa
    command: run --server --addr=0.0.0.0:8181 /policies
    ports:
      - "${OPA_PUBLISHED_PORT:-8181}:8181"
    volumes:
      - ./policies:/policies:ro
    restart: unless-stopped

  # ─── OpenFGA (Authorization) ──────────────────────────────────────
  openfga:
    image: openfga/openfga:latest
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-openfga
    profiles: ["iam"]
    command: run
    environment:
      - OPENFGA_DATASTORE_ENGINE=postgres
      - OPENFGA_DATASTORE_URI=postgresql://${POSTGRES_USER:-cyberteam}:${POSTGRES_PASSWORD:-changeme-postgres-password}@postgres:5432/${POSTGRES_DB:-cyberteam}?sslmode=disable
      - OPENFGA_HTTP_ADDR=0.0.0.0:8080
      - OPENFGA_GRPC_ADDR=0.0.0.0:8081
    ports:
      - "${OPENFGA_PUBLISHED_PORT:-9090}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ─── Keycloak (Auth) ──────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-keycloak
    profiles: ["iam"]
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: ${POSTGRES_DB:-cyberteam}
      KC_DB_USERNAME: ${POSTGRES_USER:-cyberteam}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme-postgres-password}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-changeme-keycloak-admin}
    ports:
      - "${KEYCLOAK_PUBLISHED_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ─── Langfuse (Traces & Observability) ────────────────────────────
  langfuse:
    image: langfuse/langfuse:2
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-langfuse
    profiles: ["observability"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cyberteam}:${POSTGRES_PASSWORD:-changeme-postgres-password}@postgres:5432/langfuse
      - NEXTAUTH_SECRET=changeme-nextauth-secret
      - SALT=changeme-salt
      - NEXTAUTH_URL=http://localhost:3100
      - TELEMETRY_ENABLED=false
    ports:
      - "${LANGFUSE_PUBLISHED_PORT:-3100}:3000"
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ─── Grafana ───────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-grafana
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme-grafana-admin}
      GF_INSTALL_PLUGINS: grafana-postgresql-datasource
    ports:
      - "${GRAFANA_PUBLISHED_PORT:-3500}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  # ─── Prometheus ────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-prometheus
    profiles: ["observability"]
    ports:
      - "${PROMETHEUS_PUBLISHED_PORT:-9099}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-alertmanager
    profiles: ["observability"]
    env_file: ${CYBERTEAM_ENV_FILE:-.env}
    entrypoint: ["/bin/sh", "-c"]
    command: |
      cat > /tmp/alertmanager.yml <<EOF
      global:
        smtp_smarthost: '$${SMTP_HOST:-localhost}:$${SMTP_PORT:-25}'
        smtp_from: '$${SMTP_FROM_EMAIL:-alerts@example.local}'
        smtp_auth_username: '$${SMTP_USERNAME:-}'
        smtp_auth_password: '$${SMTP_PASSWORD:-}'
        smtp_require_tls: $${SMTP_STARTTLS:-false}

      route:
        receiver: owner-email
        group_by: ['alertname', 'severity']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h

      receivers:
        - name: owner-email
          email_configs:
            - to: '$${OWNER_EMAIL:-owner@example.local}'
              send_resolved: true
              require_tls: $${SMTP_STARTTLS:-false}
      EOF
      exec /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager
    ports:
      - "${ALERTMANAGER_PUBLISHED_PORT:-9093}:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    restart: unless-stopped

  # ─── ERPNext / Frappe System of Record ────────────────────────────
  erpnext-mariadb:
    image: mariadb:10.11
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-erpnext-mariadb
    profiles: ["erp"]
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${ERPNEXT_MARIADB_ROOT_PASSWORD:-changeme-erpnext-mariadb-root}
    volumes:
      - erpnext-mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  erpnext-redis-cache:
    image: redis:7-alpine
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-erpnext-redis-cache
    profiles: ["erp"]
    volumes:
      - erpnext-redis-cache-data:/data
    restart: unless-stopped

  erpnext-redis-queue:
    image: redis:7-alpine
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-erpnext-redis-queue
    profiles: ["erp"]
    volumes:
      - erpnext-redis-queue-data:/data
    restart: unless-stopped

  erpnext-configurator:
    image: ${ERPNEXT_IMAGE:-frappe/erpnext:v16.21.1}
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-erpnext-configurator
    profiles: ["erp"]
    entrypoint: ["bash", "-lc"]
    command: >
      "ls -1 apps > sites/apps.txt &&
      bench set-config -g db_host erpnext-mariadb &&
      bench set-config -gp db_port 3306 &&
      bench set-config -g redis_cache redis://erpnext-redis-cache:6379 &&
      bench set-config -g redis_queue redis://erpnext-redis-queue:6379 &&
      bench set-config -g redis_socketio redis://erpnext-redis-queue:6379 &&
      bench set-config -gp socketio_port 9000"
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
      - erpnext-logs:/home/frappe/frappe-bench/logs
    depends_on:
      erpnext-mariadb:
        condition: service_healthy
      erpnext-redis-cache:
        condition: service_started
      erpnext-redis-queue:
        condition: service_started
    restart: "no"

  erpnext-create-site:
    image: ${ERPNEXT_IMAGE:-frappe/erpnext:v16.21.1}
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-erpnext-create-site
    profiles: ["erp"]
    entrypoint: ["bash", "-lc"]
    command: >
      "wait-for-it -t 180 erpnext-mariadb:3306 &&
      wait-for-it -t 180 erpnext-redis-cache:6379 &&
      wait-for-it -t 180 erpnext-redis-queue:6379 &&
      if [ -d sites/${ERPNEXT_SITE_NAME:-erpnext.hyperailab.com} ]; then
        echo 'ERPNext site already exists: ${ERPNEXT_SITE_NAME:-erpnext.hyperailab.com}';
      else
        bench new-site ${ERPNEXT_SITE_NAME:-erpnext.hyperailab.com} --mariadb-user-host-login-scope=% --db-root-username=root --db-root-password=${ERPNEXT_MARIADB_ROOT_PASSWORD:-changeme-erpnext-mariadb-root} --db-password=${ERPNEXT_DB_PASSWORD:-changeme-erpnext-db-password} --admin-password=${ERPNEXT_ADMIN_PASSWORD:-changeme-erpnext-admin} --install-app erpnext --set-default;
      fi"
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
      - erpnext-logs:/home/frappe/frappe-bench/logs
    depends_on:
      erpnext-configurator:
        condition: service_completed_successfully
    restart: "no"

  erpnext-backend:
    image: ${ERPNEXT_IMAGE:-frappe/erpnext:v16.21.1}
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-erpnext-backend
    profiles: ["erp"]
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
      - erpnext-logs:/home/frappe/frappe-bench/logs
    depends_on:
      erpnext-create-site:
        condition: service_completed_successfully
    restart: unless-stopped

  erpnext-frontend:
    image: ${ERPNEXT_IMAGE:-frappe/erpnext:v16.21.1}
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-erpnext-frontend
    profiles: ["erp"]
    command: ["nginx-entrypoint.sh"]
    environment:
      BACKEND: erpnext-backend:8000
      FRAPPE_SITE_NAME_HEADER: ${ERPNEXT_SITE_NAME:-erpnext.hyperailab.com}
      SOCKETIO: erpnext-websocket:9000
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: 120
      CLIENT_MAX_BODY_SIZE: 50m
    ports:
      - "${ERPNEXT_PUBLISHED_PORT:-18100}:8080"
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
      - erpnext-logs:/home/frappe/frappe-bench/logs
    depends_on:
      erpnext-backend:
        condition: service_started
      erpnext-websocket:
        condition: service_started
    restart: unless-stopped

  erpnext-websocket:
    image: ${ERPNEXT_IMAGE:-frappe/erpnext:v16.21.1}
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-erpnext-websocket
    profiles: ["erp"]
    command: ["node", "/home/frappe/frappe-bench/apps/frappe/socketio.js"]
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
      - erpnext-logs:/home/frappe/frappe-bench/logs
    depends_on:
      erpnext-create-site:
        condition: service_completed_successfully
    restart: unless-stopped

  erpnext-queue-short:
    image: ${ERPNEXT_IMAGE:-frappe/erpnext:v16.21.1}
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-erpnext-queue-short
    profiles: ["erp"]
    command: ["bench", "worker", "--queue", "short,default"]
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
      - erpnext-logs:/home/frappe/frappe-bench/logs
    depends_on:
      erpnext-create-site:
        condition: service_completed_successfully
    restart: unless-stopped

  erpnext-queue-long:
    image: ${ERPNEXT_IMAGE:-frappe/erpnext:v16.21.1}
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-erpnext-queue-long
    profiles: ["erp"]
    command: ["bench", "worker", "--queue", "long,default,short"]
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
      - erpnext-logs:/home/frappe/frappe-bench/logs
    depends_on:
      erpnext-create-site:
        condition: service_completed_successfully
    restart: unless-stopped

  erpnext-scheduler:
    image: ${ERPNEXT_IMAGE:-frappe/erpnext:v16.21.1}
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-erpnext-scheduler
    profiles: ["erp"]
    command: ["bench", "schedule"]
    volumes:
      - erpnext-sites:/home/frappe/frappe-bench/sites
      - erpnext-logs:/home/frappe/frappe-bench/logs
    depends_on:
      erpnext-create-site:
        condition: service_completed_successfully
    restart: unless-stopped

  # ─── Asterisk (Telephony) ─────────────────────────────────────────
  asterisk:
    image: andrius/asterisk:latest
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-asterisk
    profiles: ["telephony"]
    ports:
      - "${ASTERISK_SIP_UDP_PUBLISHED_PORT:-5060}:5060/udp"
      - "${ASTERISK_SIP_TCP_PUBLISHED_PORT:-5060}:5060/tcp"
      - "${ASTERISK_RTP_PUBLISHED_RANGE:-10000-10099}:10000-10099/udp"
      - "${ASTERISK_ARI_PUBLISHED_PORT:-8089}:8088"
    volumes:
      - asterisk-config:/etc/asterisk
      - asterisk-spool:/var/spool/asterisk
    restart: unless-stopped

  # ─── Jasmin SMS Gateway ────────────────────────────────────────────
  jasmin:
    image: jookies/jasmin:latest
    container_name: ${CYBERTEAM_CONTAINER_PREFIX:-cyberteam}-jasmin
    profiles: ["telephony"]
    ports:
      - "${JASMIN_CLI_PUBLISHED_PORT:-1401}:1401"
      - "${JASMIN_HTTP_PUBLISHED_PORT:-8999}:8999"
    volumes:
      - jasmin-data:/etc/jasmin
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  temporal-data:
  grafana-data:
  prometheus-data:
  alertmanager-data:
  core-data:
  erpnext-sites:
  erpnext-logs:
  erpnext-mariadb-data:
  erpnext-redis-cache-data:
  erpnext-redis-queue-data:
  asterisk-config:
  asterisk-spool:
  jasmin-data:

networks:
  default:
    name: ${CYBERTEAM_NETWORK_NAME:-cyberteam-network}
