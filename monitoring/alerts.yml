groups:
  - name: cyberteam-core
    rules:
      - alert: CyberTeamApiDown
        expr: up{job="cyberteam-core"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Cyber-Team API is not scrapeable
          description: Prometheus has not been able to scrape the core API for 2 minutes.

      - alert: CyberTeamApi5xxErrors
        expr: sum(rate(cyberteam_http_requests_total{status_code=~"5.."}[5m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Cyber-Team API is returning 5xx responses
          description: One or more API routes have returned server errors for 5 minutes.

      - alert: CyberTeamCommunicationFailures
        expr: sum(rate(cyberteam_communication_deliveries_total{status="failed"}[5m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Outbound communication provider failures detected
          description: At least one configured communication provider has failed deliveries.

      - alert: CyberTeamCircuitBreakerOpened
        expr: increase(cyberteam_circuit_breaker_state_changes_total{state="open"}[10m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Communication provider circuit breaker opened
          description: A provider has crossed its repeated-failure threshold and is cooling down.

      - alert: CyberTeamAuthorizationDenialsSpike
        expr: sum(rate(cyberteam_authorization_decisions_total{decision="denied"}[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Authorization denial rate is elevated
          description: Authorization denials are above the expected steady-state threshold.

      - alert: CyberTeamToolExecutionFailures
        expr: sum(rate(cyberteam_tool_executions_total{status=~"failed|blocked"}[5m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Tool executions are failing or blocked
          description: One or more tools are failing, blocked by readiness, or blocked by approval policy.

      - alert: CyberTeamRepeatedMemoryFailures
        expr: sum(rate(cyberteam_memory_operations_total{status=~"failed|unavailable"}[5m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Memory recall/write failures detected
          description: Agent memory operations are failing or the memory service is unavailable.

      - alert: CyberTeamApprovalBacklogGrowth
        expr: |
          sum(increase(cyberteam_approval_events_total{action="requested"}[1h]))
          -
          sum(increase(cyberteam_approval_events_total{action=~"approved|rejected|consumed"}[1h])) > 10
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Approval backlog is growing
          description: Approval requests are arriving faster than decisions or consumption events.

      - alert: CyberTeamLlmErrorRate
        expr: sum(rate(cyberteam_llm_invocations_total{status="failed"}[5m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: LLM invocation failures detected
          description: Agent LLM calls are failing and may affect chat, planning, or workflow execution.

      - alert: CyberTeamPlannerBlocks
        expr: sum(rate(cyberteam_planner_blocks_total[10m])) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Autonomous planner is blocking work
          description: Planner policy gates or readiness checks are blocking autonomous actions.

      - alert: CyberTeamWorkflowInactivity
        expr: absent_over_time(cyberteam_workflow_state_changes_total[6h])
        for: 0m
        labels:
          severity: info
        annotations:
          summary: No workflow state changes observed
          description: No workflow state-change metrics were observed for 6 hours.
